services:
  # CockroachDB
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8081:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Initialize database
  cockroachdb-init:
    image: cockroachdb/cockroach:v23.2.0
    depends_on:
      cockroachdb:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /cockroach/cockroach sql --insecure --host=cockroachdb --execute="
          CREATE DATABASE IF NOT EXISTS scheduler;
          CREATE USER IF NOT EXISTS scheduler;
          GRANT ALL ON DATABASE scheduler TO scheduler;
        "
        /cockroach/cockroach sql --insecure --host=cockroachdb --database=scheduler --execute="
          CREATE TABLE IF NOT EXISTS scheduled_jobs (
              id UUID PRIMARY KEY,
              job_key TEXT,
              key_policy TEXT NOT NULL DEFAULT 'QUEUE',
              sleep_start TEXT NOT NULL DEFAULT 'SELF',
              cron_expression TEXT,

              fire_at TIMESTAMPTZ NOT NULL,
              effective_fire_at TIMESTAMPTZ,
              arrived_at TIMESTAMPTZ NOT NULL,

              destination_topic TEXT NOT NULL,
              message_key BYTEA,
              message_value BYTEA NOT NULL,
              headers JSONB,
              advisory_headers_pattern TEXT,

              state TEXT NOT NULL DEFAULT 'PENDING',
              max_retries INT NOT NULL DEFAULT 3,
              retry_count INT NOT NULL DEFAULT 0,
              version INT NOT NULL DEFAULT 0,

              predecessor_id UUID REFERENCES scheduled_jobs(id),
              sequence_num INT NOT NULL DEFAULT 0,

              acquired_by TEXT,
              acquired_at TIMESTAMPTZ,
              created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at TIMESTAMPTZ,

              last_error TEXT,

              -- Cron fields
              last_fired_at TIMESTAMPTZ,
              last_completed_at TIMESTAMPTZ,
              fire_count INT DEFAULT 0,
              cron_concurrent BOOLEAN DEFAULT false,
              cron_min_gap INTERVAL,
              cron_gap_policy TEXT DEFAULT 'DELAY',
              cron_misfire_policy TEXT DEFAULT 'SKIP',
              cron_end_at TIMESTAMPTZ,
              cron_max_count INT
          );

          CREATE INDEX IF NOT EXISTS idx_scheduled_jobs_pending_fire
              ON scheduled_jobs (effective_fire_at)
              WHERE state = 'PENDING';

          CREATE INDEX IF NOT EXISTS idx_scheduled_jobs_key_state
              ON scheduled_jobs (job_key, state)
              WHERE job_key IS NOT NULL;

          CREATE INDEX IF NOT EXISTS idx_scheduled_jobs_predecessor
              ON scheduled_jobs (predecessor_id)
              WHERE predecessor_id IS NOT NULL;

          CREATE INDEX IF NOT EXISTS idx_scheduled_jobs_acquired
              ON scheduled_jobs (acquired_by, acquired_at)
              WHERE state = 'ACQUIRED' OR state = 'FIRING';
        "

  # Kafka (using KRaft mode, no ZooKeeper)
  kafka:
    image: apache/kafka:4.3.1
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Create Kafka topics
  kafka-init:
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scheduler.in --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scheduler.dlq --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scheduler.advisory --partitions 6 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic scheduler.advisory.dlq --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic test.destination --partitions 3 --replication-factor 1
        echo "Topics created successfully"

  # Scheduler application
  scheduler:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_PROFILE=kafka
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://cockroachdb:26257/scheduler?sslmode=disable
      - QUARKUS_DATASOURCE_USERNAME=scheduler
      - QUARKUS_DATASOURCE_PASSWORD=
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CAMEL_COMPONENT_KAFKA_BROKERS=kafka:9092
      - SCHEDULER_IN=kafka:scheduler.in
      - SCHEDULER_ADVISORY=kafka:scheduler.advisory
      - SCHEDULER_DLQ=kafka:scheduler.dlq
      - SCHEDULER_ADVISORY_DLQ=kafka:scheduler.advisory.dlq
    depends_on:
      cockroachdb-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/q/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Test runner
  test:
    image: apache/kafka:4.3.1
    depends_on:
      scheduler:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=========================================="
        echo "Running integration tests..."
        echo "=========================================="

        # Test 1: Immediate job
        echo ""
        echo "Test 1: Immediate job (no delay)"
        echo '{"test": "immediate"}' | /opt/kafka/bin/kafka-console-producer.sh \
          --bootstrap-server kafka:9092 \
          --topic scheduler.in \
          --property "parse.headers=true" \
          --property "headers.delimiter=|" \
          --property "headers.separator=:" \
          <<< "SCHEDULER_DESTINATION:test.destination|{\"test\": \"immediate\"}"

        sleep 2

        echo "Checking test.destination for message..."
        timeout 10 /opt/kafka/bin/kafka-console-consumer.sh \
          --bootstrap-server kafka:9092 \
          --topic test.destination \
          --from-beginning \
          --max-messages 1 \
          --timeout-ms 10000 && echo "PASS: Immediate job delivered" || echo "FAIL: No message received"

        # Test 2: Delayed job (5 seconds)
        echo ""
        echo "Test 2: Delayed job (5 seconds)"
        echo "SCHEDULER_DESTINATION:test.destination|SCHEDULER_SLEEP:PT5S|{\"test\": \"delayed\"}" | /opt/kafka/bin/kafka-console-producer.sh \
          --bootstrap-server kafka:9092 \
          --topic scheduler.in \
          --property "parse.headers=true" \
          --property "headers.delimiter=|" \
          --property "headers.separator=:"

        echo "Waiting 7 seconds for delayed job..."
        sleep 7

        echo "Checking for delayed message..."
        timeout 5 /opt/kafka/bin/kafka-console-consumer.sh \
          --bootstrap-server kafka:9092 \
          --topic test.destination \
          --from-beginning \
          --max-messages 2 \
          --timeout-ms 5000 | grep -q "delayed" && echo "PASS: Delayed job delivered" || echo "FAIL: Delayed message not found"

        # Test 3: Check advisory events
        echo ""
        echo "Test 3: Advisory events"
        timeout 5 /opt/kafka/bin/kafka-console-consumer.sh \
          --bootstrap-server kafka:9092 \
          --topic scheduler.advisory \
          --from-beginning \
          --max-messages 4 \
          --timeout-ms 5000 && echo "PASS: Advisory events published" || echo "FAIL: No advisory events"

        # Test 4: Health check
        echo ""
        echo "Test 4: Health endpoint"
        wget -q -O - http://scheduler:8080/q/health && echo "" && echo "PASS: Health check OK" || echo "FAIL: Health check failed"

        echo ""
        echo "=========================================="
        echo "Integration tests complete"
        echo "=========================================="

volumes:
  cockroach-data:
  kafka-data:
