# Kubernetes Secrets (mounted files) configuration example
# No extra dependencies required - uses built-in file config source

# Mount your K8s secret as files in the pod:
#
# volumes:
#   - name: db-credentials
#     secret:
#       secretName: scheduler-db-credentials
# volumeMounts:
#   - name: db-credentials
#     mountPath: /var/run/secrets/db
#     readOnly: true

# Reference mounted secret files
quarkus.datasource.username=${file:/var/run/secrets/db/username}
quarkus.datasource.password=${file:/var/run/secrets/db/password}

# Alternative: use environment variables from K8s secrets
# In your deployment.yaml:
#
# env:
#   - name: DB_USERNAME
#     valueFrom:
#       secretKeyRef:
#         name: scheduler-db-credentials
#         key: username
#   - name: DB_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: scheduler-db-credentials
#         key: password
#
# Then reference them:
# quarkus.datasource.username=${DB_USERNAME}
# quarkus.datasource.password=${DB_PASSWORD}
