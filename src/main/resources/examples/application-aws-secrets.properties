# AWS Secrets Manager configuration example
# Copy to application.properties or use as a Quarkus profile: -Dquarkus.profile=aws-secrets

# AWS region (required)
quarkus.secretsmanager.aws.region=us-east-1

# Optional: endpoint override for LocalStack or custom endpoint
# quarkus.secretsmanager.endpoint-override=http://localhost:4566

# Optional: credentials (defaults to standard AWS credential chain)
# quarkus.secretsmanager.aws.credentials.type=static
# quarkus.secretsmanager.aws.credentials.static-provider.access-key-id=test
# quarkus.secretsmanager.aws.credentials.static-provider.secret-access-key=test

# Database credentials from Secrets Manager
# Secret format: {"username": "scheduler", "password": "secret123"}
quarkus.datasource.username=${sm:scheduler/db#username}
quarkus.datasource.password=${sm:scheduler/db#password}

# Or reference individual secrets
# quarkus.datasource.password=${sm:scheduler-db-password}

# You can also use secrets for Kafka credentials
# kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${sm:kafka-creds#username}" password="${sm:kafka-creds#password}";
