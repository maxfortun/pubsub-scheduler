# Kafka SSL/TLS configuration example
# Enables encrypted connections and optional client certificate authentication

# Broker connection with SSL
kafka.bootstrap.servers=kafka.example.com:9093
camel.component.kafka.brokers=kafka.example.com:9093

# Security protocol
kafka.security.protocol=SSL
camel.component.kafka.security-protocol=SSL

# Truststore (CA certificate to verify broker)
kafka.ssl.truststore.location=/etc/kafka/certs/truststore.jks
kafka.ssl.truststore.password=${sm:kafka/ssl#truststore-password}
# Or use PEM format (no truststore needed)
# kafka.ssl.truststore.type=PEM
# kafka.ssl.truststore.certificates=/etc/kafka/certs/ca.crt

camel.component.kafka.ssl-truststore-location=/etc/kafka/certs/truststore.jks
camel.component.kafka.ssl-truststore-password=${sm:kafka/ssl#truststore-password}

# Keystore (client certificate for mutual TLS / mTLS)
# Only needed if broker requires client authentication
kafka.ssl.keystore.location=/etc/kafka/certs/keystore.jks
kafka.ssl.keystore.password=${sm:kafka/ssl#keystore-password}
kafka.ssl.key.password=${sm:kafka/ssl#key-password}

camel.component.kafka.ssl-keystore-location=/etc/kafka/certs/keystore.jks
camel.component.kafka.ssl-keystore-password=${sm:kafka/ssl#keystore-password}
camel.component.kafka.ssl-key-password=${sm:kafka/ssl#key-password}

# Optional: hostname verification
kafka.ssl.endpoint.identification.algorithm=https

# Optional: allowed TLS versions and cipher suites
# kafka.ssl.enabled.protocols=TLSv1.3,TLSv1.2
# kafka.ssl.cipher.suites=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256
