# Kafka OAUTHBEARER configuration example
# Token-based authentication using OAuth 2.0 / OIDC

# Broker connection
kafka.bootstrap.servers=kafka.example.com:9093
camel.component.kafka.brokers=kafka.example.com:9093

# Security protocol
kafka.security.protocol=SASL_SSL
camel.component.kafka.security-protocol=SASL_SSL

# SASL mechanism
kafka.sasl.mechanism=OAUTHBEARER
camel.component.kafka.sasl-mechanism=OAUTHBEARER

# ============================================================
# Option 1: Client Credentials flow (service-to-service)
# Uses Kafka's built-in OAuthBearerLoginCallbackHandler
# ============================================================

kafka.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
  clientId="${sm:kafka/oauth#client-id}" \
  clientSecret="${sm:kafka/oauth#client-secret}" \
  scope="kafka" \
  tokenEndpointUrl="https://auth.example.com/oauth/token";

kafka.sasl.oauthbearer.token.endpoint.url=https://auth.example.com/oauth/token

camel.component.kafka.sasl-jaas-config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
  clientId="${sm:kafka/oauth#client-id}" \
  clientSecret="${sm:kafka/oauth#client-secret}" \
  scope="kafka" \
  tokenEndpointUrl="https://auth.example.com/oauth/token";

# ============================================================
# Option 2: OIDC provider (Keycloak, Auth0, Azure AD, etc.)
# ============================================================

# For Keycloak:
# kafka.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
#   clientId="scheduler" \
#   clientSecret="${sm:kafka/oauth#client-secret}" \
#   scope="openid" \
#   tokenEndpointUrl="https://keycloak.example.com/realms/kafka/protocol/openid-connect/token";

# For Azure AD / Entra ID:
# kafka.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
#   clientId="${sm:kafka/oauth#client-id}" \
#   clientSecret="${sm:kafka/oauth#client-secret}" \
#   scope="https://your-eventhub.servicebus.windows.net/.default" \
#   tokenEndpointUrl="https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token";

# ============================================================
# Option 3: Confluent Cloud
# ============================================================

# For Confluent Cloud with Identity Pools:
# kafka.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required \
#   clientId="${sm:confluent/oauth#client-id}" \
#   clientSecret="${sm:confluent/oauth#client-secret}" \
#   scope="kafka" \
#   tokenEndpointUrl="https://login.confluent.io/oauth/token" \
#   extension_logicalCluster="${CONFLUENT_CLUSTER_ID}" \
#   extension_identityPoolId="${CONFLUENT_IDENTITY_POOL_ID}";

# ============================================================
# SSL Truststore (required for SASL_SSL)
# ============================================================

kafka.ssl.truststore.location=/etc/kafka/certs/truststore.jks
kafka.ssl.truststore.password=${sm:kafka/ssl#truststore-password}

camel.component.kafka.ssl-truststore-location=/etc/kafka/certs/truststore.jks
camel.component.kafka.ssl-truststore-password=${sm:kafka/ssl#truststore-password}

# ============================================================
# Token validation (broker-side, for reference)
# ============================================================

# On the broker, configure the validator:
# sasl.oauthbearer.jwks.endpoint.url=https://auth.example.com/.well-known/jwks.json
# sasl.oauthbearer.expected.audience=kafka
# sasl.oauthbearer.expected.issuer=https://auth.example.com/
