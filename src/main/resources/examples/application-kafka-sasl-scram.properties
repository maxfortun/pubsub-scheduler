# Kafka SASL/SCRAM configuration example
# Secure username/password authentication with salted challenge-response
# More secure than PLAIN as password is never sent over the wire

# Broker connection
kafka.bootstrap.servers=kafka.example.com:9093
camel.component.kafka.brokers=kafka.example.com:9093

# Security protocol
kafka.security.protocol=SASL_SSL
camel.component.kafka.security-protocol=SASL_SSL

# SASL mechanism: SCRAM-SHA-256 or SCRAM-SHA-512
kafka.sasl.mechanism=SCRAM-SHA-512
camel.component.kafka.sasl-mechanism=SCRAM-SHA-512

# SASL credentials
kafka.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="${sm:kafka/sasl#username}" \
  password="${sm:kafka/sasl#password}";

camel.component.kafka.sasl-jaas-config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="${sm:kafka/sasl#username}" \
  password="${sm:kafka/sasl#password}";

# Truststore for SSL
kafka.ssl.truststore.location=/etc/kafka/certs/truststore.jks
kafka.ssl.truststore.password=${sm:kafka/ssl#truststore-password}

camel.component.kafka.ssl-truststore-location=/etc/kafka/certs/truststore.jks
camel.component.kafka.ssl-truststore-password=${sm:kafka/ssl#truststore-password}

# Create SCRAM credentials on broker:
# kafka-configs.sh --bootstrap-server localhost:9092 \
#   --alter --add-config 'SCRAM-SHA-512=[password=secret]' \
#   --entity-type users --entity-name scheduler
