# AWS Systems Manager Parameter Store configuration example
# Copy to application.properties or use as a Quarkus profile: -Dquarkus.profile=aws-ssm

# AWS region (required)
quarkus.ssm.aws.region=us-east-1

# Optional: endpoint override for LocalStack
# quarkus.ssm.endpoint-override=http://localhost:4566

# Optional: credentials (defaults to standard AWS credential chain)
# quarkus.ssm.aws.credentials.type=static
# quarkus.ssm.aws.credentials.static-provider.access-key-id=test
# quarkus.ssm.aws.credentials.static-provider.secret-access-key=test

# Database credentials from Parameter Store
# Parameters should be created as SecureString for passwords
quarkus.datasource.username=${ssm:/scheduler/db/username}
quarkus.datasource.password=${ssm:/scheduler/db/password}

# You can organize by environment
# quarkus.datasource.password=${ssm:/prod/scheduler/db/password}
