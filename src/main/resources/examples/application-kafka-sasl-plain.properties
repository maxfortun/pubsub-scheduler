# Kafka SASL/PLAIN configuration example
# Username/password authentication over SSL

# Broker connection
kafka.bootstrap.servers=kafka.example.com:9093
camel.component.kafka.brokers=kafka.example.com:9093

# Security protocol: SASL over SSL (encrypted + authenticated)
kafka.security.protocol=SASL_SSL
camel.component.kafka.security-protocol=SASL_SSL

# SASL mechanism
kafka.sasl.mechanism=PLAIN
camel.component.kafka.sasl-mechanism=PLAIN

# SASL credentials
# Using secret provider for secure credential storage
kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${sm:kafka/sasl#username}" \
  password="${sm:kafka/sasl#password}";

camel.component.kafka.sasl-jaas-config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${sm:kafka/sasl#username}" \
  password="${sm:kafka/sasl#password}";

# Truststore for SSL (verify broker certificate)
kafka.ssl.truststore.location=/etc/kafka/certs/truststore.jks
kafka.ssl.truststore.password=${sm:kafka/ssl#truststore-password}

camel.component.kafka.ssl-truststore-location=/etc/kafka/certs/truststore.jks
camel.component.kafka.ssl-truststore-password=${sm:kafka/ssl#truststore-password}

# For SASL_PLAINTEXT (unencrypted, NOT recommended for production)
# kafka.security.protocol=SASL_PLAINTEXT
