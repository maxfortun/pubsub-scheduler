# HashiCorp Vault configuration example
# Copy to application.properties or use as a Quarkus profile: -Dquarkus.profile=vault

# Vault server URL
quarkus.vault.url=https://vault.example.com

# Authentication method (choose one)

# Option 1: Token authentication
quarkus.vault.authentication.client-token=${VAULT_TOKEN}

# Option 2: Kubernetes authentication (recommended for K8s)
# quarkus.vault.authentication.kubernetes.role=scheduler
# quarkus.vault.authentication.kubernetes.jwt-token-path=/var/run/secrets/kubernetes.io/serviceaccount/token

# Option 3: AppRole authentication
# quarkus.vault.authentication.app-role.role-id=${VAULT_ROLE_ID}
# quarkus.vault.authentication.app-role.secret-id=${VAULT_SECRET_ID}

# Option 4: AWS IAM authentication
# quarkus.vault.authentication.aws-iam.role=scheduler

# TLS configuration (if using self-signed certs)
# quarkus.vault.tls.skip-verify=false
# quarkus.vault.tls.ca-cert=/path/to/ca.crt

# Database credentials from Vault KV v2 secrets engine
# Path: secret/data/scheduler/db with keys "username" and "password"
quarkus.datasource.username=${vault:secret/data/scheduler/db#username}
quarkus.datasource.password=${vault:secret/data/scheduler/db#password}

# Dynamic database credentials (Vault generates short-lived credentials)
# Requires Vault database secrets engine configured
# quarkus.vault.credentials-provider.db.database-credentials-role=scheduler-db
# quarkus.datasource.credentials-provider=db
