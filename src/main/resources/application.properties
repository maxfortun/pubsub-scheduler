# Scheduler configuration (common)

# Instance identity (uses hostname by default - unique per container/pod)
scheduler.instance-id=${HOSTNAME:scheduler-0}

# Heartbeat configuration for dynamic shard discovery
# Instances heartbeat to DB; shards assigned by ranking live instances
scheduler.heartbeat.interval-seconds=${SCHEDULER_HEARTBEAT_INTERVAL:30}
scheduler.heartbeat.stale-threshold-seconds=${SCHEDULER_HEARTBEAT_STALE:120}

# Default retry policy (can be overridden per-job via SCHEDULER_RETRY_COUNT header)
scheduler.default-retries=3

# Default advisory header filter (regex for non-SCHEDULER_ headers to include)
scheduler.default-advisory-headers=.*

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/scheduler
quarkus.datasource.username=scheduler
quarkus.datasource.password=scheduler
quarkus.datasource.jdbc.max-size=20

# Health
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.category."net.maxf".level=DEBUG
quarkus.log.category."org.apache.camel".level=INFO

# Camel routes location (select kafka.xml or activemq.xml)
camel.main.routes-include-pattern=classpath:camel/kafka.xml
