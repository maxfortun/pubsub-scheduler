# Scheduler configuration
scheduler.in=kafka:scheduler.in
scheduler.advisory=kafka:scheduler.advisory
scheduler.dlq=kafka:scheduler.dlq
scheduler.advisory.dlq=kafka:scheduler.advisory.dlq
scheduler.consumer-group=scheduler-group

# Default retry policy (can be overridden per-job via SCHEDULER_RETRIES header)
scheduler.default-retries=3

# Default advisory header filter (regex for non-SCHEDULER_ headers to include)
scheduler.default-advisory-headers=.*

# Kafka
kafka.bootstrap.servers=localhost:9092

# Camel Kafka consumer
camel.component.kafka.brokers=${kafka.bootstrap.servers}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/scheduler
quarkus.datasource.username=scheduler
quarkus.datasource.password=scheduler
quarkus.datasource.jdbc.max-size=20

# Health
quarkus.health.extensions.enabled=true

# Logging
quarkus.log.category."com.maxfortun".level=DEBUG
quarkus.log.category."org.apache.camel".level=INFO
