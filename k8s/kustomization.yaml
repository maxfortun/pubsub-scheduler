apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pubsub-scheduler

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - statefulset.yaml
  - pdb.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: pubsub-scheduler
  app.kubernetes.io/component: scheduler
  app.kubernetes.io/part-of: pubsub-scheduler

images:
  - name: pubsub-scheduler
    newTag: latest
