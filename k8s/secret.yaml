apiVersion: v1
kind: Secret
metadata:
  name: pubsub-scheduler-db
  namespace: pubsub-scheduler
  labels:
    app.kubernetes.io/name: pubsub-scheduler
type: Opaque
stringData:
  # CockroachDB connection (update for your cluster)
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://cockroachdb.cockroachdb.svc.cluster.local:26257/scheduler?sslmode=verify-full&sslrootcert=/certs/ca.crt"
  QUARKUS_DATASOURCE_USERNAME: "scheduler"
  QUARKUS_DATASOURCE_PASSWORD: ""
