apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pubsub-scheduler
  namespace: pubsub-scheduler
  labels:
    app.kubernetes.io/name: pubsub-scheduler
spec:
  serviceName: pubsub-scheduler
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: pubsub-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pubsub-scheduler
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: shard-init
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Extract ordinal from pod name (pubsub-scheduler-0 -> 0)
              ORDINAL=${HOSTNAME##*-}
              echo "SCHEDULER_SHARD_INDEX=${ORDINAL}" > /shard-config/shard.env
              echo "Shard index: ${ORDINAL}"
          volumeMounts:
            - name: shard-config
              mountPath: /shard-config
      containers:
        - name: scheduler
          image: pubsub-scheduler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          command:
            - sh
            - -c
            - |
              # Source shard config and start app
              . /shard-config/shard.env
              export SCHEDULER_SHARD_INDEX
              exec java -jar /app/quarkus-run.jar
          env:
            - name: SCHEDULER_SHARD_COUNT
              value: "3"
          envFrom:
            - configMapRef:
                name: pubsub-scheduler-config
            - secretRef:
                name: pubsub-scheduler-db
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: shard-config
              mountPath: /shard-config
              readOnly: true
      volumes:
        - name: shard-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pubsub-scheduler
  namespace: pubsub-scheduler
  labels:
    app.kubernetes.io/name: pubsub-scheduler
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: pubsub-scheduler
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: pubsub-scheduler-headless
  namespace: pubsub-scheduler
  labels:
    app.kubernetes.io/name: pubsub-scheduler
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: pubsub-scheduler
